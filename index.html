<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOTS FILMS21 - Clean Transparent</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        body { 
            background: #111; 
            color: #fff; 
            overflow-x: hidden; 
        }
        
        /* Navbar & Search */
        nav { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); 
            padding: 20px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: fixed; 
            width: 100%;
            top: 0; 
            z-index: 1000; 
            transition: background 0.3s ease;
        }
        nav.scrolled {
            background: rgba(0, 0, 0, 0.95);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .logo { 
            font-weight: 800; 
            font-size: 1.5rem; 
            color: #e50914; 
            letter-spacing: 1px;
            cursor: pointer;
            white-space: nowrap; 
        }
        
        .search-box input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            outline: none;
            transition: 0.3s;
            width: 200px;
        }
        .search-box input:focus {
            border-color: #e50914;
            background: rgba(0, 0, 0, 0.8);
            width: 230px; 
        }

        .menu-btn {
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 500;
            transition: color 0.3s;
            white-space: nowrap;
        }
        .menu-btn:hover { color: #e50914; }

        /* Fullscreen Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .mobile-menu.active {
            opacity: 1;
            pointer-events: all;
        }
        .mobile-menu a {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            transition: color 0.3s;
        }
        .mobile-menu a:hover { color: #e50914; }

        /* Hero Section */
        .hero { 
            height: 85vh; 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            align-items: center; 
            cursor: grab; 
            transition: background-image 0.8s ease-in-out; 
            position: relative;
        }
        .hero:active { cursor: grabbing; }
        
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 120px;
            background: linear-gradient(to top, #111, transparent);
            z-index: 1;
        }

        .hero-overlay { 
            padding: 0 40px; 
            background: linear-gradient(to right, rgba(0,0,0,0.4), transparent); 
            height: 100%; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            z-index: 2;
        }

        .hero-container {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
            margin-top: 40px;
        }

        /* Teks Kiri */
        .hero-left {
            flex: 0 0 50%;
            max-width: 50%;
        }
        .hero h1 { 
            font-size: 3.5rem; 
            margin-bottom: 15px; 
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            line-height: 1.1;
        }
        .hero p {
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #ddd;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }
        .btn-play { 
            background: #e50914; 
            color: white; 
            padding: 12px 30px; 
            font-size: 1.1rem;
            font-weight: bold;
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: background 0.3s, transform 0.2s;
        }
        .btn-play:hover { 
            background: #f40612; 
            transform: scale(1.05);
        }

        /* Viewport Carousel */
        .hero-right {
            flex: 0 0 45%;
            max-width: 45%;
            position: relative;
            overflow: hidden; 
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            background: transparent;
        }

        /* Track Carousel */
        .carousel-track {
            display: flex;
            gap: 12px; 
            align-items: center;
            position: absolute;
            left: 0;
            will-change: transform;
        }

        /* Card Poster Slider */
        .carousel-card {
            min-width: 95px; 
            height: 140px;
            border-radius: 6px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.4s ease, opacity 0.4s ease, border-color 0.4s ease;
            opacity: 0.3;
            user-select: none;
            -webkit-user-drag: none;
            border: 2px solid transparent;
        }
        .carousel-card:hover { opacity: 0.6; }
        .carousel-card.active {
            opacity: 1;
            transform: scale(1.18); 
            border-color: #e50914;
        }

        /* Movie Grid Bawah */
        .content-section { 
            padding: 20px 40px; 
            margin-top: 10px; 
            position: relative;
            z-index: 3;
        }
        .content-section h2 { margin-bottom: 15px; font-size: 1.5rem; }
        
        .movie-row { 
            display: flex; 
            overflow-x: auto; 
            gap: 20px; 
            padding: 20px 0; 
            scrollbar-width: none; 
        }
        .movie-row::-webkit-scrollbar { display: none; }
        
        .movie-card { 
            min-width: 160px; 
            cursor: pointer; 
            transition: transform 0.3s ease; 
        }
        .movie-card:hover { transform: scale(1.1); z-index: 10; }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; border-radius: 6px; }

        /* ==================== VIDEO PLAYER MODAL ==================== */
        .player-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            position: relative;
            width: 90%;
            max-width: 950px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #e50914;
        }
        .close-modal {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #fff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            z-index: 2100;
            transition: color 0.3s;
        }
        .close-modal:hover {
            color: #e50914;
        }
        .iframe-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ==================== FIX PORTRAIT MODE (HP) ==================== */
        @media (max-width: 768px) {
            nav {
                padding: 12px 15px;
            }
            .nav-left {
                gap: 10px;
                flex: 1;
                max-width: 75%;
            }
            .logo {
                font-size: 1.1rem;
            }
            .search-box {
                flex: 1;
                max-width: 120px;
            }
            .search-box input {
                width: 100%;
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .menu-btn {
                font-size: 1rem;
                margin-left: auto;
            }

            .hero {
                height: auto;
                min-height: 85vh; 
                padding-top: 80px;
                padding-bottom: 20px;
            }
            
            .hero-overlay { 
                padding: 0 20px; 
                background: transparent !important; 
            }
            
            .hero-container { 
                flex-direction: column; 
                text-align: center; 
                gap: 25px; 
                margin-top: 0; 
            }
            
            .hero-left { 
                max-width: 100%; 
                width: 100%;
                flex: unset; 
            }
            .hero h1 { 
                font-size: 2.2rem; 
                text-shadow: 2px 2px 8px rgba(0,0,0,1); 
            }
            .hero p { 
                font-size: 0.95rem; 
                margin-bottom: 20px; 
                text-shadow: 1px 1px 6px rgba(0,0,0,1);
            }
            
            .hero-right {
                max-width: 100%;
                width: 100%; 
                flex: unset;
                height: 160px; 
                display: flex;
                align-items: center;
                background: transparent !important;
                box-shadow: none !important;
            }
            .carousel-card { 
                min-width: 80px; 
                height: 115px; 
                box-shadow: none !important; 
            }
            
            .content-section { padding: 20px; }
            .movie-card { min-width: 130px; }
            .movie-card img { height: 195px; }
            .modal-content { width: 95%; }
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="nav-left">
            <div class="logo" onclick="resetToTrending()">HOTS FILMS21</div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Cari..." onkeypress="handleSearch(event)">
            </div>
        </div>
        <div class="menu-btn" onclick="toggleMenu()">☰ Menu</div>
    </nav>

    <div class="mobile-menu" id="mobile-menu">
        <a href="#" onclick="toggleMenu(); resetToTrending();">Beranda</a>
        <a href="#" onclick="toggleMenu()">Serial TV</a>
        <a href="#" onclick="toggleMenu()">Film</a>
        <div class="menu-btn" onclick="toggleMenu()" style="margin-top: 30px;">✕ Tutup</div>
    </div>

    <!-- Hero Section -->
    <section class="hero" id="hero">
        <div class="hero-overlay">
            <div class="hero-container">
                <div class="hero-left">
                    <h1 id="hero-title">Memuat...</h1>
                    <p id="hero-desc">Mencari film terpopuler hari ini...</p>
                    <button class="btn-play" onclick="playHero()">▶ Tonton Sekarang</button>
                </div>
                
                <!-- Viewport Carousel -->
                <div class="hero-right" id="carousel-viewport">
                    <div class="carousel-track" id="hero-carousel-track">
                        <!-- Diisi via JavaScript otomatis -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="content-section">
        <h2 id="section-title">Trending Hari Ini</h2>
        <div class="movie-row" id="trending-row"></div>
    </div>

    <!-- Video Player Pop-up Modal -->
    <div id="player-modal" class="player-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePlayer()">&times;</span>
            <div class="iframe-container">
                <iframe id="video-player" src="" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '43f171359a813f49865e48efd239d139';
        const BASE_URL = 'https://api.themoviedb.org/3';
        
        // WATCHMOVIE / STREAMING API CONFIGURATION
        const STREAM_TOKEN = '3aNd6wD7xi8O1dNlmIfcBFMG3zmXC2UFIBZ1PJzF';
        // URL di bawah memakai struktur umum provider embed. Silakan ganti domain "vidsrc.me" jika kamu menggunakan domain watchmivienya yang spesifik.
        const STREAM_BASE_URL = 'https://vidsrc.me/embed/movie'; 

        let heroMovies = [], currentIndex = 0, activeGlobalIndex = 0, slideInterval;

        function toggleMenu() {
            document.getElementById('mobile-menu').classList.toggle('active');
        }

        // Fungsi Membuka Player Video
        function openPlayer(tmdbId) {
            const modal = document.getElementById('player-modal');
            const iframe = document.getElementById('video-player');
            
            // Format URL Pemutar Video digabungkan dengan TMDB ID dan Token API kamu
            iframe.src = `${STREAM_BASE_URL}?tmdb=${tmdbId}&token=${STREAM_TOKEN}`;
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Kunci scroll latar belakang
        }

        // Fungsi Menutup Player Video
        function closePlayer() {
            const modal = document.getElementById('player-modal');
            const iframe = document.getElementById('video-player');
            
            iframe.src = ''; // Menghentikan video agar tidak bersuara di latar belakang
            modal.style.display = 'none';
            document.body.style.overflow = 'auto'; // Aktifkan scroll kembali
        }

        function playHero() {
            if(heroMovies.length > 0) {
                const movie = heroMovies[currentIndex];
                openPlayer(movie.id);
            }
        }

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });

        function updateHero(isInstant = false) {
            if (heroMovies.length === 0) return;

            const movie = heroMovies[currentIndex];
            const title = movie.title || movie.name;
            const desc = movie.overview ? movie.overview.substring(0, 120) + '...' : '';
            
            document.getElementById('hero').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${movie.backdrop_path}')`;
            document.getElementById('hero-title').innerText = title;
            document.getElementById('hero-desc').innerText = desc;

            const track = document.getElementById('hero-carousel-track');
            const viewport = document.getElementById('carousel-viewport');
            const cards = document.querySelectorAll('.carousel-card');

            cards.forEach((card, idx) => {
                if (idx === activeGlobalIndex) card.classList.add('active');
                else card.classList.remove('active');
            });

            const activeCard = cards[activeGlobalIndex];
            if (track && viewport && activeCard) {
                track.style.transition = isInstant ? 'none' : 'transform 0.45s cubic-bezier(0.25, 1, 0.5, 1)';
                
                const viewportCenter = viewport.offsetWidth / 2;
                const cardCenter = activeCard.offsetLeft + (activeCard.offsetWidth / 2);
                const translateX = viewportCenter - cardCenter;

                track.style.transform = `translateX(${translateX}px)`;
            }
        }

        function changeSlide(dir) {
            const N = heroMovies.length;
            activeGlobalIndex += dir;
            
            currentIndex = activeGlobalIndex % N;
            if (currentIndex < 0) currentIndex += N;

            updateHero(false);
        }

        const trackElement = document.getElementById('hero-carousel-track');
        trackElement.addEventListener('transitionend', () => {
            const N = heroMovies.length;
            if (activeGlobalIndex < N) {
                activeGlobalIndex += N;
                updateHero(true); 
            } 
            else if (activeGlobalIndex >= N * 2) {
                activeGlobalIndex -= N;
                updateHero(true); 
            }
        });

        window.addEventListener('resize', () => {
            updateHero(true); 
        });

        function setHeroIndex(realIdx, globalIdx) {
            clearInterval(slideInterval);
            currentIndex = realIdx;
            activeGlobalIndex = globalIdx;
            updateHero(false);
            startAutoSlide();
        }

        function startAutoSlide() { 
            clearInterval(slideInterval); 
            slideInterval = setInterval(() => changeSlide(1), 5000); 
        }

        let touchStartX = 0;
        document.getElementById('hero').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        document.getElementById('hero').addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].screenX;
            if (Math.abs(diff) > 40) {
                clearInterval(slideInterval);
                changeSlide(diff > 0 ? 1 : -1);
                startAutoSlide();
            }
        }, {passive: true});

        let isDragging = false, mouseStartX = 0;
        document.getElementById('hero').addEventListener('mousedown', e => { 
            isDragging = true; 
            mouseStartX = e.pageX; 
        });

        document.getElementById('hero').addEventListener('mouseup', e => {
            if (!isDragging) return;
            isDragging = false;
            const diff = mouseStartX - e.pageX;
            if (Math.abs(diff) > 40) {
                clearInterval(slideInterval);
                changeSlide(diff > 0 ? 1 : -1);
                startAutoSlide();
            }
        });
        document.getElementById('hero').addEventListener('mouseleave', () => isDragging = false);

        async function init() {
            try {
                const res = await fetch(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}&language=id-ID`);
                const data = await res.json();
                
                heroMovies = data.results.filter(m => m.backdrop_path && m.poster_path).slice(0, 6); 
                const N = heroMovies.length;
                
                activeGlobalIndex = N; 
                currentIndex = 0;
                
                let trackHTML = '';
                for (let set = 0; set < 3; set++) {
                    trackHTML += heroMovies.map((m, idx) => {
                        const globalIdx = (set * N) + idx;
                        return `<img class="carousel-card" src="https://image.tmdb.org/t/p/w300${m.poster_path}" alt="Poster" onclick="setHeroIndex(${idx}, ${globalIdx})">`;
                    }).join('');
                }
                
                document.getElementById('hero-carousel-track').innerHTML = trackHTML;

                if (heroMovies.length > 0) {
                    updateHero(true); 
                    startAutoSlide();
                }
                
                renderMovies(data.results);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderMovies(movies) {
            const row = document.getElementById('trending-row');
            if (movies.length === 0) {
                row.innerHTML = '<p style="padding: 20px;">Film tidak ditemukan.</p>';
                return;
            }
            row.innerHTML = movies.filter(m => m.poster_path).map(m => {
                return `
                    <div class="movie-card" onclick="openPlayer(${m.id})">
                        <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" alt="Poster">
                    </div>
                `;
            }).join('');
        }

        async function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('search-input').value.trim();
                const sectionTitle = document.getElementById('section-title');
                const row = document.getElementById('trending-row');

                if (!query) {
                    resetToTrending();
                    return;
                }

                try {
                    sectionTitle.innerText = `Hasil Pencarian: "${query}"`;
                    row.innerHTML = '<p style="padding: 20px;">Mencari film...</p>';
                    const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&language=id-ID&query=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    renderMovies(data.results);
                } catch (error) {
                    console.error('Search error:', error);
                    row.innerHTML = '<p style="padding: 20px;">Gagal mencari film.</p>';
                }
            }
        }

        function resetToTrending() {
            document.getElementById('search-input').value = "";
            init();
        }

        init();
    </script>
</body>
</html>
